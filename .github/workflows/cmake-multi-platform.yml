name: CMake CI
on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, windows-latest ]
        build_type: [ Debug, Release, RelWithDebInfo ]
        include:
          # Linux GCC
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc
            cxx: g++

#          # Linux Clang
#          - os: ubuntu-24.04
#            compiler: clang
#            cc: clang
#            cxx: clang++
#
#          # Windows MSVC
#          - os: windows-latest
#            compiler: msvc
#            cc: cl
#            cxx: cl
    steps:
      - uses: actions/checkout@v4

      # Install Ninja on Linux
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev ninja-build gcc-13 g++-13 clang

      # Setup MSVC environment
#      - name: Setup MSVC
#        if: runner.os == 'Windows'
#        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure